<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="site-content">
    <h1>Example Website</h1>
    <p>
      This mock page shows how your assistant appears as an embedded AI support agent.
      The chat stays out of the way until users need help.
    </p>
  </main>

  <section class="chat-widget" id="chatWidget">
    <button class="chat-launcher" id="chatLauncher" aria-label="Open chat" aria-expanded="false">
      AI
    </button>

    <div class="chat-panel" id="chatPanel" aria-hidden="true">
      <header class="chatbot-header">
        <div>
          <h2 class="chatbot-title">AI Assistant</h2>
          <p class="chatbot-subtitle">Online now</p>
        </div>
        <button class="collapse-btn" id="chatCollapse" aria-label="Minimize chat">-</button>
      </header>

      <section id="chat" aria-live="polite"></section>

      <div class="composer">
        <input id="msg" placeholder="Ask me anything..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </section>

  <script>
    const chatWidget = document.getElementById('chatWidget');
    const chatLauncher = document.getElementById('chatLauncher');
    const chatPanel = document.getElementById('chatPanel');
    const chatCollapse = document.getElementById('chatCollapse');
    const msgInput = document.getElementById('msg');
    const chat = document.getElementById('chat');
    const sendBtn = document.getElementById('sendBtn');

    function setWidgetOpen(isOpen) {
      chatWidget.classList.toggle('is-open', isOpen);
      chatLauncher.setAttribute('aria-expanded', String(isOpen));
      chatPanel.setAttribute('aria-hidden', String(!isOpen));

      if (isOpen) {
        msgInput.focus();
      }
    }

    chatLauncher.addEventListener('click', () => {
      setWidgetOpen(!chatWidget.classList.contains('is-open'));
    });

    chatCollapse.addEventListener('click', () => {
      setWidgetOpen(false);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setWidgetOpen(false);
      }
    });

    function appendMessage(role, text) {
      const bubble = document.createElement('div');
      bubble.className = `message ${role}`;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    msgInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    });

    appendMessage('bot', 'Hi, I am your AI assistant. How can I help you today?');

    async function sendMessage() {
      const msg = msgInput.value.trim();
      if (!msg) return;

      appendMessage('user', msg);
      msgInput.value = '';
      sendBtn.disabled = true;

      try {
        const response = await fetch('http://localhost:3000/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: msg
          })
        });

        const data = await response.json();
        appendMessage('bot', data.reply || 'No response returned.');
      } catch (error) {
        appendMessage('bot', 'Request failed. Check that the backend server is running.');
      } finally {
        sendBtn.disabled = false;
        msgInput.focus();
      }
    }
  </script>
</body>
</html>
